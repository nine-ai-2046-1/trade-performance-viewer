<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nines - Trading Calendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'nines-dark': '#1a1a2e',
            'nines-darker': '#16213e',
            'nines-darkest': '#0f0f23',
            'nines-cell': 'rgba(255,255,255,0.05)',
            'nines-border': 'rgba(255,255,255,0.1)',
            'profit': '#ff6b9d',
            'loss': '#c44569',
            'accent': '#f8b500',
          },
          fontFamily: {
            'nunito': ['Nunito', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #1a1a2e;
      color: #e2e8f0;
      padding: 40px 20px;
    }

    .calendar-page {
      max-width: 900px;
      margin: 0 auto;
    }

    .calendar-page > h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 40px;
      color: #f8b500;
    }

    .month-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .month-nav button {
      background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .month-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .month-nav button:not(:disabled):hover {
      opacity: 0.8;
    }

    .month-section {
      background: #16213e;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      margin-bottom: 32px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .month-header {
      text-align: center;
      padding: 20px 16px 12px;
      font-size: 20px;
      font-weight: 700;
      color: #f8b500;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .weekday-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .weekday-cell {
      text-align: center;
      padding: 10px 4px;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .date-cell {
      min-height: 90px;
      padding: 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative;
      background: rgba(255,255,255,0.03);
    }

    .date-cell:nth-child(7n) {
      border-right: none;
    }

    .date-cell.other-month {
      background: rgba(0,0,0,0.2);
    }

    .date-cell.other-month .date-number {
      color: #475569;
    }

    .date-number {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 4px;
      display: inline-block;
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
    }

    .date-cell.today .date-number {
      background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
      color: #ffffff;
      font-weight: 700;
    }

    .pl-item {
      font-size: 11px;
      padding: 1px 4px;
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }

    .pl-item.profit {
      color: #ff6b9d;
    }

    .pl-item.loss {
      color: #c44569;
    }

    .pl-total {
      font-size: 10px;
      padding: 1px 4px;
      margin-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #f8b500;
      font-weight: 700;
    }

    .kaomoji {
      font-size: 9px;
      margin-left: 2px;
    }

    .sparkline-container {
      margin-top: 4px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="calendar-page">
    <h1>Nines</h1>
    <div class="month-nav">
      <button id="prevBtn" onclick="prevMonth()">← Previous</button>
      <span id="currentMonth"></span>
      <button id="nextBtn" onclick="nextMonth()">Next →</button>
    </div>
    <div id="calendar-container"></div>
  </div>

  <script>
    const WEEKDAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

    const PRODUCT_COLORS = {
      "JPN225": "#ff9f43",
      "US500": "#7c5cbf",
      "HK50": "#4ecdc4"
    };

    let calendarData = {};
    let availableMonths = [];
    let currentMonthIndex = 0;

    async function loadCSVData() {
      const response = await fetch("data/data.csv", {
        headers: {
          "Cache-Control": "no-cache, no-store, must-revalidate",
          "Pragma": "no-cache",
          "Expires": "0"
        }
      });
      if (!response.ok) {
        throw new Error(`Failed to load CSV: ${response.statusText}`);
      }
      return await response.text();
    }

    function parseCSV(csvText) {
      const lines = csvText.split("\n");
      const trades = [];
      
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        
        const parts = line.split(",");
        if (parts.length < 7) continue;
        
        const closeTime = parts[0].trim();
        const product = parts[1].trim();
        const direction = parts[2].trim();
        const entryPrice = parseFloat(parts[3]);
        const closePrice = parseFloat(parts[4]);
        const volume = parts[5].trim();
        const netProfit = parseFloat(parts[6]);
        
        if (isNaN(netProfit)) continue;
        
        const date = parseDate(closeTime);
        if (!date) continue;
        
        trades.push({
          date,
          product,
          direction,
          entryPrice,
          closePrice,
          volume,
          netProfit
        });
      }
      
      return trades;
    }

    function parseDate(dateStr) {
      const match = dateStr.match(/(\d+)\s+(\d+)\s+月\s+(\d+)\s+(\d+):(\d+):(\d+)/);
      if (!match) return null;
      
      const day = parseInt(match[1]);
      const month = parseInt(match[2]);
      const year = parseInt(match[3]);
      const hours = parseInt(match[4]);
      const minutes = parseInt(match[5]);
      const seconds = parseInt(match[6]);
      
      return new Date(year, month - 1, day, hours, minutes, seconds);
    }

    function getDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function dailyPLByProduct(trades) {
      const result = {};
      
      trades.forEach(trade => {
        const dateKey = getDateKey(trade.date);
        if (!result[dateKey]) {
          result[dateKey] = {};
        }
        if (!result[dateKey][trade.product]) {
          result[dateKey][trade.product] = 0;
        }
        result[dateKey][trade.product] += trade.netProfit;
      });
      
      return result;
    }

    function dailyTotalPL(plByProduct) {
      const result = {};
      
      Object.keys(plByProduct).forEach(date => {
        const products = plByProduct[date];
        const total = Object.values(products).reduce((sum, pl) => sum + pl, 0);
        result[date] = { products, total };
      });
      
      return result;
    }

    function buildCalendarData(trades) {
      const plByProduct = dailyPLByProduct(trades);
      return dailyTotalPL(plByProduct);
    }

    function prevMonth() {
      if (currentMonthIndex > 0) {
        currentMonthIndex--;
        renderCurrentMonth();
      }
    }

    function nextMonth() {
      if (currentMonthIndex < availableMonths.length - 1) {
        currentMonthIndex++;
        renderCurrentMonth();
      }
    }

    function renderCurrentMonth() {
      const container = document.getElementById("calendar-container");
      const monthLabel = document.getElementById("currentMonth");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      
      if (availableMonths.length === 0) {
        container.innerHTML = "<p>No data available</p>";
        return;
      }
      
      const m = availableMonths[currentMonthIndex];
      monthLabel.textContent = m.name;
      
      prevBtn.disabled = currentMonthIndex === 0;
      nextBtn.disabled = currentMonthIndex === availableMonths.length - 1;
      
      container.innerHTML = "";
      const monthEl = renderMonth(m.year, m.month, m.name);
      container.appendChild(monthEl);
    }

    function getAvailableMonths(data) {
      const monthsSet = new Set();
      const months = [];
      
      Object.keys(data).forEach(dateKey => {
        const [year, month] = dateKey.split("-").map(Number);
        const key = `${year}-${month}`;
        if (!monthsSet.has(key)) {
          monthsSet.add(key);
          const monthNames = ["January", "February", "March", "April", "May", "June",
                            "July", "August", "September", "October", "November", "December"];
          months.push({
            year,
            month,
            name: `${monthNames[month - 1]} ${year}`
          });
        }
      });
      
      months.sort((a, b) => a.year - b.year || a.month - b.month);
      return months;
    }

    function getMonthlyPL(year, month) {
      let total = 0;
      const daysInMonth = getDaysInMonth(year, month);
      
      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        if (calendarData[dateKey]) {
          total += calendarData[dateKey].total;
        }
      }
      
      return total;
    }

    function getFirstDayOfMonth(year, month) {
      const day = new Date(year, month - 1, 1).getDay();
      return day === 0 ? 6 : day - 1;
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function isToday(year, month, day) {
      const today = new Date();
      return today.getFullYear() === year &&
             today.getMonth() + 1 === month &&
             today.getDate() === day;
    }

    function getPrevMonth(year, month) {
      if (month === 1) return { year: year - 1, month: 12 };
      return { year, month: month - 1 };
    }

    function getNextMonth(year, month) {
      if (month === 12) return { year: year + 1, month: 1 };
      return { year, month: month + 1 };
    }

    function getKaomoji(pl) {
      if (pl > 0) return '<span class="kaomoji">(◕‿◕)</span>';
      if (pl < 0) return '<span class="kaomoji">(｡•́︿•̀｡)</span>';
      return '<span class="kaomoji">(・_・)</span>';
    }

    function createCell(y, m, d, isOtherMonth) {
      const cell = document.createElement("div");
      cell.className = "date-cell";
      if (isOtherMonth) cell.classList.add("other-month");

      const dateKey = `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

      if (isToday(y, m, d)) {
        cell.classList.add("today");
      }

      const dateNum = document.createElement("span");
      dateNum.className = "date-number";
      dateNum.textContent = d;
      cell.appendChild(dateNum);

      const dayData = calendarData[dateKey];
      if (dayData && !isOtherMonth) {
        const { products, total } = dayData;
        
        Object.keys(products).forEach(product => {
          const pl = products[product];
          const sign = pl > 0 ? "+" : "";
          const plValue = Math.round(Math.abs(pl));
          const plDisplay = pl < 0 ? `($${plValue})` : `${sign}$${plValue}`;
          
          const item = document.createElement("div");
          item.className = `pl-item ${pl > 0 ? 'profit' : pl < 0 ? 'loss' : ''}`;
          item.innerHTML = `${getKaomoji(pl)} ${product} ${plDisplay}`;
          cell.appendChild(item);
        });
        
        const totalSign = total > 0 ? "+" : "";
        const totalItem = document.createElement("div");
        totalItem.className = "pl-total";
        const totalValue = Math.round(Math.abs(total));
        const totalDisplay = total < 0 ? `($${totalValue})` : `${totalSign}$${totalValue}`;
        totalItem.innerHTML = `${getKaomoji(total)} Total: ${totalDisplay}`;
        cell.appendChild(totalItem);
      }

      return cell;
    }

    function renderMonth(year, month, name) {
      const section = document.createElement("div");
      section.className = "month-section";

      const header = document.createElement("div");
      header.className = "month-header";
      
      const monthlyPL = getMonthlyPL(year, month);
      if (monthlyPL !== 0) {
        const monthlySign = monthlyPL > 0 ? "+" : "";
        const monthlyEmoji = monthlyPL > 0 ? "💖" : "💔";
        const monthlyValue = Math.round(Math.abs(monthlyPL));
        const monthlyDisplay = monthlyPL < 0 ? `($${monthlyValue})` : `${monthlySign}$${monthlyValue}`;
        header.innerHTML = `${name}<br>${monthlyEmoji} Total: ${monthlyDisplay}`;
      } else {
        header.textContent = name;
      }
      section.appendChild(header);

      const weekdayRow = document.createElement("div");
      weekdayRow.className = "weekday-row";
      WEEKDAYS.forEach(day => {
        const cell = document.createElement("div");
        cell.className = "weekday-cell";
        cell.textContent = day;
        weekdayRow.appendChild(cell);
      });
      section.appendChild(weekdayRow);

      const grid = document.createElement("div");
      grid.className = "calendar-grid";

      const firstDay = getFirstDayOfMonth(year, month);
      const totalDays = getDaysInMonth(year, month);
      const prev = getPrevMonth(year, month);
      const next = getNextMonth(year, month);
      const prevMonthDays = getDaysInMonth(prev.year, prev.month);

      for (let i = firstDay - 1; i >= 0; i--) {
        const d = prevMonthDays - i;
        grid.appendChild(createCell(prev.year, prev.month, d, true));
      }

      for (let day = 1; day <= totalDays; day++) {
        grid.appendChild(createCell(year, month, day, false));
      }

      const totalCells = firstDay + totalDays;
      const rows = Math.ceil(totalCells / 7);
      const remaining = rows * 7 - totalCells;
      for (let day = 1; day <= remaining; day++) {
        grid.appendChild(createCell(next.year, next.month, day, true));
      }

      section.appendChild(grid);
      return section;
    }

    async function init() {
      const container = document.getElementById("calendar-container");
      try {
        const csvText = await loadCSVData();
        const trades = parseCSV(csvText);
        calendarData = buildCalendarData(trades);
        availableMonths = getAvailableMonths(calendarData);
        
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;
        
        currentMonthIndex = availableMonths.findIndex(
          m => m.year === currentYear && m.month === currentMonth
        );
        
        if (currentMonthIndex === -1) {
          currentMonthIndex = availableMonths.length - 1;
        }
        
        renderCurrentMonth();
      } catch (error) {
        container.innerHTML = `<div style="color: #ff6b9d; text-align: center; padding: 40px;">
          <h2>Error loading data</h2>
          <p>${error.message}</p>
        </div>`;
      }
    }

    init();
  </script>
  <script src="sparklines.js" defer></script>
</body>
</html>
